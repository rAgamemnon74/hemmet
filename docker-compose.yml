services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: hemmet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hemmet
      POSTGRES_PASSWORD: hemmet_dev
      POSTGRES_DB: hemmet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
